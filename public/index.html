<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4A90E2">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>조씨네 Osaka Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --red2: #e74c3c;
    --orange: #e67e22;
    --cream: #fffbf5;
    --ink: #1a1410;
    --muted: #8a7a6a;
    --border: #e8ddd0;
    --surface: #fff;
    --bg: #f7f2eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--red);
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    padding: 2rem 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '🇯🇵';
    position: absolute;
    right: -10px;
    top: -10px;
    font-size: 80px;
    opacity: 0.08;
    transform: rotate(15deg);
  }
  .header-dates {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: white;
    line-height: 1.2;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-title em {
    font-style: italic;
    font-weight: 400;
    color: rgba(255,255,255,0.8);
    font-size: 22px;
  }

  /* ── PHOTO ZONE ── */
  .photo-zone {
    margin: 1.25rem;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    background: white;
    border: 2px dashed var(--border);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .photo-zone:hover { border-color: var(--red2); }
  .photo-zone.has-photo { border: none; }
  .photo-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    min-height: 160px;
    gap: 8px;
  }
  .photo-icon {
    width: 52px; height: 52px;
    background: #fdf0ed;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .photo-placeholder p { font-size: 14px; color: var(--muted); font-weight: 500; }
  .photo-placeholder span { font-size: 12px; color: #bbb; }
  #photoPreview {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
    background: #1a1410;
    display: none;
  }
  .photo-change-btn {
    position: absolute;
    bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.55);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    font-family: inherit;
    display: none;
  }
  .photo-zone.has-photo .photo-change-btn { display: block; }
  .photo-zone.has-photo .photo-placeholder { display: none; }
  .photo-zone.has-photo #photoPreview { display: block; }
  #photoInput { display: none; }

  /* ── SECTION LABELS ── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 1.25rem;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  #checklistSectionLabel {
    user-select: none;
    transition: color 0.15s;
  }
  #checklistSectionLabel:hover { color: var(--red2); }

  /* ── DAY CARDS ── */
  .days-scroll {
    padding: 0 1.25rem;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .day-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 10px 6px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: visible;
  }
  .day-card:hover {
    border-color: var(--red2);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(192,57,43,0.12);
  }
  .day-card.active {
    background: var(--red);
    border-color: var(--red);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(192,57,43,0.3);
  }
  .day-card.active .dc-date,
  .day-card.active .dc-weekday,
  .day-card.active .dc-name { color: white; }
  .day-card.active .dc-weekday { color: rgba(255,255,255,0.7); }
  .dc-emoji { font-size: 20px; display: block; margin-bottom: 5px; font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif; line-height: 1.3; }
  .dc-date { font-size: 16px; font-weight: 700; color: var(--ink); display: block; }
  .dc-weekday { font-size: 10px; color: var(--muted); display: block; margin-top: 1px; }
  .dc-name { font-size: 10px; color: var(--muted); display: block; margin-top: 2px; font-weight: 500; }
  .dot-badge {
    width: 7px; height: 7px;
    background: #27ae60;
    border-radius: 50%;
    position: absolute;
    top: 7px; right: 7px;
    border: 1.5px solid white;
  }
  .day-card.active .dot-badge { border-color: var(--red); }

  /* ── SCHEDULE PANEL ── */
  .schedule-panel {
    margin: 0 1.25rem 1.5rem;
    background: white;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .panel-head {
    background: linear-gradient(135deg, var(--red) 0%, var(--orange) 100%);
    padding: 1.1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-day-info { flex: 1; }
  .panel-day-title { font-size: 16px; font-weight: 700; color: white; }
  .panel-day-sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
  .add-item-btn {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.2);
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 50%;
    color: white;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    line-height: 1;
    padding-bottom: 1px;
  }
  .add-item-btn:hover { background: rgba(255,255,255,0.35); }

  /* ── ITEMS ── */
  .items-container { padding: 6px 0 8px; min-height: 80px; }
  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: #ccc;
    font-size: 13px;
    line-height: 1.8;
  }
  .empty-icon { font-size: 32px; display: block; margin-bottom: 8px; }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 1.25rem;
    border-bottom: 0.5px solid #f5f0ea;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .item:last-child { border-bottom: none; }
  .item-time {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    min-width: 44px;
    padding-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .item-main { flex: 1; }
  .item-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 3px;
  }
  .badge-move { background: #eaf4fd; color: #1a6fa0; }
  .badge-tour { background: #eafaf1; color: #1a7a40; }
  .badge-food { background: #fef6e4; color: #9a5f0a; }
  .badge-stay { background: #f5eef8; color: #6c3483; }
  .badge-check { background: #eafaf1; color: #1a7a40; }
  .badge-etc  { background: #fdf2f2; color: #922b21; }
  .item-text { font-size: 13px; color: var(--ink); line-height: 1.55; }
  .item-memo { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .item-cat-icon {
    font-size: 16px;
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    background: #f5f0ea;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  .item-place { font-size: 12px; color: #1a6fa0; margin-top: 2px; line-height: 1.4; }
  .map-btn { color: #1a6fa0 !important; font-size: 16px !important; }
  .place-input-wrap { display: flex; gap: 6px; align-items: center; }
  .place-input-wrap input { flex: 1; }
  .place-search-btn {
    background: var(--red);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .place-search-btn:hover { background: #a93226; }

  /* 사진 업로드 */
  .photo-upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    min-height: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .photo-upload-area:hover { border-color: var(--red); }
  .photo-upload-placeholder { display: flex; flex-direction: column; align-items: center; padding: 14px; }

  /* 썸네일 그리드 (모달 내) */
  .photo-preview-grid {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
  }
  .photo-thumb-wrap {
    position: relative; width: 80px; height: 80px; border-radius: 10px; overflow: hidden;
  }
  .photo-thumb {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .photo-thumb-del {
    position: absolute; top: 3px; right: 3px;
    background: rgba(0,0,0,0.55); color: white; border: none;
    border-radius: 50%; width: 20px; height: 20px; font-size: 11px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    padding: 0;
  }

  /* 일정 카드 내 사진 그리드 */
  .item-photos-grid {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .item-photo {
    width: 80px; height: 80px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    display: block;
    transition: opacity 0.2s;
  }
  .item-photo:hover { opacity: 0.85; }

  /* 사진 전체보기 뷰어 */
  .photo-viewer {
    position: fixed; inset: 0; background: rgba(0,0,0,0.93);
    z-index: 9999; display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .photo-viewer img { max-width: 88vw; max-height: 85vh; border-radius: 8px; object-fit: contain; }
  .photo-viewer-close {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.15); border: none; color: white;
    font-size: 22px; width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .photo-viewer-prev, .photo-viewer-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.15); border: none; color: white;
    font-size: 32px; width: 44px; height: 44px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .photo-viewer-prev { left: 16px; }
  .photo-viewer-next { right: 16px; }
  .photo-viewer-counter {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.8); font-size: 13px; background: rgba(0,0,0,0.4);
    padding: 4px 12px; border-radius: 20px;
  }
  .day-select-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .day-select-btn {
    background: #f5f0ea;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 7px 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: all 0.15s;
    font-family: inherit;
  }
  .day-select-btn.selected {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }
  .day-select-btn.selected .day-select-weekday { color: rgba(255,255,255,0.75); }
  .day-select-emoji { font-size: 14px; line-height: 1; }
  .day-select-date { font-size: 12px; font-weight: 700; }
  .day-select-weekday { font-size: 10px; color: var(--muted); }
  .item-actions { display: flex; gap: 2px; }
  .item-action-btn {
    background: none; border: none;
    width: 28px; height: 28px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    color: #ccc;
    transition: all 0.15s;
  }
  .item-action-btn:hover { background: #f5f0ea; color: var(--muted); }
  .item-action-btn.del:hover { background: #fdf2f2; color: var(--red2); }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,20,16,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: white;
    width: 100%;
    max-width: 520px;
    border-radius: 24px 24px 0 0;
    padding: 0;
    max-height: 90vh;
    overflow-y: auto;
    animation: sheetUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 36px; height: 4px;
    background: #e0d8d0;
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    padding: 1rem 1.5rem 0.75rem;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close {
    background: #f5f0ea; border: none;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }
  .modal-body { padding: 1.25rem 1.5rem 1rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .cat-btn {
    background: #f7f2eb;
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 8px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .cat-btn:hover { border-color: var(--border); background: #f0ebe4; }
  .cat-btn.selected { border-color: var(--red2); background: #fdf2f2; }
  .cat-btn-icon { font-size: 18px; display: block; }
  .cat-btn-label { font-size: 10px; color: var(--muted); margin-top: 2px; display: block; font-weight: 500; }
  .cat-btn.selected .cat-btn-label { color: var(--red2); font-weight: 700; }
  input[type="time"],
  input[type="text"],
  textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    background: #fffbf8;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input[type="time"]:focus,
  input[type="text"]:focus,
  textarea:focus { border-color: var(--red2); background: white; }
  textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .modal-footer {
    padding: 0.75rem 1.5rem 1.5rem;
    display: flex;
    gap: 8px;
  }
  .btn-cancel {
    flex: 1;
    background: #f5f0ea;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-cancel:hover { background: #ece7e0; }
  .btn-save {
    flex: 2;
    background: var(--red);
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    color: white;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #a93226; }

  /* ── EDIT MODAL ── */
  .edit-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,20,16,0.5);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .edit-overlay.open { display: flex; }

  /* ── MEMO SECTION ── */
  .memo-section {
    margin: 0 1.25rem 1.5rem;
    background: white;
    border-radius: 16px;
    border: 1.5px solid var(--border);
    overflow: hidden;
  }
  .memo-head {
    padding: 0.8rem 1.25rem;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .memo-body textarea {
    border: none;
    border-radius: 0;
    background: white;
    padding: 0.75rem 1.25rem;
    font-size: 13px;
    color: var(--ink);
    min-height: 80px;
  }
  .memo-body textarea:focus { border: none; background: white; }

  /* ── FOOTER ── */
  .app-footer {
    text-align: center;
    padding: 1rem;
    font-size: 11px;
    color: #ccc;
  }
  .app-footer span { color: var(--red2); }

  /* ── CHECKLIST SECTION ── */
  .checklist-section {
    margin: 0 1.25rem 1.5rem;
    background: white;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    overflow: hidden;
  }
  .checklist-head {
    background: linear-gradient(135deg, #2c3e50 0%, #4a90d9 100%);
    padding: 1rem 1.25rem;
  }
  .checklist-head-title { font-size: 15px; font-weight: 700; color: white; }
  .checklist-head-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 3px; }
  .progress-bar-wrap {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    height: 4px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: white;
    border-radius: 10px;
    transition: width 0.4s ease;
  }
  .checklist-body { padding: 6px 0 8px; min-height: 60px; }
  .checklist-day-block { padding: 0 1.25rem 4px; }
  .checklist-day-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 0 5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .checklist-day-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 0.5px solid #f5f0ea;
    animation: fadeIn 0.2s ease;
  }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-checkbox {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: white;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc,
  deleteDoc, updateDoc, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// ── FIREBASE ─────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAJxW5pRGS5s4svn98rVqHbbTDRNFnbpUI",
  authDomain: "osaka-planner-d09f4.firebaseapp.com",
  projectId: "osaka-planner-d09f4",
  storageBucket: "osaka-planner-d09f4.firebasestorage.app",
  messagingSenderId: "193860568839",
  appId: "1:193860568839:web:19ec09270d62ce187a27a2"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
// Cloudinary 설정
const CLOUDINARY_CLOUD = "diogojypo";
const CLOUDINARY_PRESET = "osaka_planner";

// ── DATA ─────────────────────────────────────────────────────────
const DAYS = [
  { date:'5/24', weekday:'일', name:'출발&도톤보리', emoji:'✈️' },
  { date:'5/25', weekday:'월', name:'오사카', emoji:'🏯' },
  { date:'5/26', weekday:'화', name:'오사카', emoji:'🦌' },
  { date:'5/27', weekday:'수', name:'유니버셜', emoji:'🎮' },
  { date:'5/28', weekday:'목', name:'교토로 이동', emoji:'🎡' },
  { date:'5/29', weekday:'금', name:'교토', emoji:'⛩️' },
  { date:'5/30', weekday:'토', name:'교토', emoji:'🍜' },
  { date:'5/31', weekday:'일', name:'귀국', emoji:'🏠' },
];
const CAT = {
  move:  { label:'이동', emoji:'🚃', cls:'badge-move' },
  tour:  { label:'관광', emoji:'🏯', cls:'badge-tour' },
  food:  { label:'식사', emoji:'🍜', cls:'badge-food' },
  stay:  { label:'숙박', emoji:'🏨', cls:'badge-stay' },
  check: { label:'체크', emoji:'✅', cls:'badge-check' },
  etc:   { label:'기타', emoji:'📌', cls:'badge-etc'  },
};

let activeDay = null;
let editId = null;
let editDocId = null;
// 각 날짜별 실시간 아이템 캐시
const itemsCache = {};
// 각 날짜별 메모 캐시
const memosCache = {};

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── FIRESTORE LISTENERS ───────────────────────────────────────────
// 전체 날짜에 대해 실시간 리스너 등록
DAYS.forEach((_, i) => {
  const itemsRef = collection(db, 'days', String(i), 'items');
  onSnapshot(query(itemsRef, orderBy('time')), (snap) => {
    itemsCache[i] = [];
    snap.forEach(d => itemsCache[i].push({ docId: d.id, ...d.data() }));
    // 그리드 dot-badge 업데이트
    const card = document.getElementById('dayCard-' + i);
    if (card) {
      const existing = card.querySelector('.dot-badge');
      if (itemsCache[i].length > 0 && !existing) {
        const dot = document.createElement('div');
        dot.className = 'dot-badge';
        card.appendChild(dot);
      } else if (itemsCache[i].length === 0 && existing) {
        existing.remove();
      }
    }
    // 현재 열린 패널이면 다시 렌더
    if (activeDay === i) renderPanel();
    // 체크리스트 업데이트 (check 카테고리 항목 반영)
    if (typeof renderChecklist === 'function') renderChecklist();
  });

  // 메모 리스너
  onSnapshot(doc(db, 'memos', String(i)), (snap) => {
    memosCache[i] = snap.exists() ? (snap.data().text || '') : '';
    if (activeDay === i) {
      document.getElementById('dayMemo').value = memosCache[i];
    }
  });
});

// ── DAYS GRID ────────────────────────────────────────────────────
window.renderDaysGrid = function renderDaysGrid() {
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  DAYS.forEach((d, i) => {
    const items = itemsCache[i] || [];
    const card = document.createElement('div');
    card.className = 'day-card' + (activeDay === i ? ' active' : '');
    card.id = 'dayCard-' + i;
    card.onclick = () => selectDay(i);

    const emojiSpan = document.createElement('span');
    emojiSpan.className = 'dc-emoji';
    emojiSpan.textContent = d.emoji;

    const dateSpan = document.createElement('span');
    dateSpan.className = 'dc-date';
    dateSpan.textContent = d.date;

    const weekdaySpan = document.createElement('span');
    weekdaySpan.className = 'dc-weekday';
    weekdaySpan.textContent = d.weekday;

    const nameSpan = document.createElement('span');
    nameSpan.className = 'dc-name';
    nameSpan.textContent = d.name;

    card.appendChild(emojiSpan);
    card.appendChild(dateSpan);
    card.appendChild(weekdaySpan);
    card.appendChild(nameSpan);

    if (items.length > 0) {
      const dot = document.createElement('div');
      dot.className = 'dot-badge';
      card.appendChild(dot);
    }

    grid.appendChild(card);
  });
}

window.selectDay = function selectDay(i) {
  activeDay = i;
  renderDaysGrid();
  renderPanel();
  document.getElementById('scheduleWrap').style.display = '';
  // 뒤로가기 가로채기용 히스토리 추가
  history.pushState({ scheduleOpen: true }, '');
  setTimeout(() => {
    document.getElementById('scheduleWrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

window.closeSchedule = function() {
  document.getElementById('scheduleWrap').style.display = 'none';
}

// 뒤로가기 누르면 상세일정 닫기
window.addEventListener('popstate', function(e) {
  const wrap = document.getElementById('scheduleWrap');
  if (wrap && wrap.style.display !== 'none') {
    wrap.style.display = 'none';
  }
});

// ── PANEL ────────────────────────────────────────────────────────
window.renderPanel = function renderPanel() {
  if (activeDay === null) return;
  const d = DAYS[activeDay];
  document.getElementById('panelTitle').textContent = `${d.emoji} ${d.date}(${d.weekday}) · ${d.name}`;
  const items = (itemsCache[activeDay] || []).slice().sort((a,b) => (a.time||'').localeCompare(b.time||''));
  document.getElementById('panelSub').textContent = items.length ? `총 ${items.length}개 일정` : '+ 버튼으로 일정을 추가하세요';
  document.getElementById('dayMemo').value = memosCache[activeDay] || '';

  const container = document.getElementById('itemsContainer');
  if (!items.length) {
    container.innerHTML = `<div class="empty-state"><span class="empty-icon">🗓️</span>아직 일정이 없어요.<br>위 + 버튼으로 추가해 보세요!</div>`;
    return;
  }
  container.innerHTML = items.map(item => {
    const cat = CAT[item.cat] || CAT.etc;
    const canMap = ['move','tour','food','stay','etc'].includes(item.cat);
    const mapQuery = encodeURIComponent(item.place || item.content);
    return `
    <div class="item" id="item-${item.docId}">
      <div class="item-cat-icon">${cat.emoji}</div>
      <div class="item-time">${escHtml(item.time || '—')}</div>
      <div class="item-main">
        <span class="item-badge ${cat.cls}">${cat.label}</span>
        <div class="item-text">${escHtml(item.content)}</div>
        ${item.place ? `<div class="item-place">📍 ${escHtml(item.place)}</div>` : ''}
        ${item.memo ? `<div class="item-memo">${escHtml(item.memo)}</div>` : ''}
        ${(() => {
          const urls = item.photoUrls && item.photoUrls.length > 0
            ? item.photoUrls
            : (item.photoUrl ? [item.photoUrl] : []);
          if (urls.length === 0) return '';
          // urls를 data 속성으로 저장해서 따옴표 충돌 방지
          const docId = item.docId;
          window.__photoCache = window.__photoCache || {};
          window.__photoCache[docId] = urls;
          return `<div class="item-photos-grid">${urls.map((u,idx) =>
            `<img class="item-photo" src="${u}" onclick="openPhotoViewerById('${docId}', ${idx})" alt="첨부사진">`
          ).join('')}</div>`;
        })()}
      </div>
      <div class="item-actions">
        ${canMap ? `<button class="item-action-btn map-btn" onclick="openMap('${mapQuery}')" title="지도">🗺️</button>` : ''}
        <button class="item-action-btn" onclick="openEditModal('${item.docId}')" title="수정">✎</button>
        <button class="item-action-btn del" onclick="deleteItem('${item.docId}')" title="삭제">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── MEMO ─────────────────────────────────────────────────────────
let memoTimer;
window.saveMemo = function() {
  if (activeDay === null) return;
  clearTimeout(memoTimer);
  memoTimer = setTimeout(async () => {
    const text = document.getElementById('dayMemo').value;
    await setDoc(doc(db, 'memos', String(activeDay)), { text });
  }, 800);
};

// ── ADD MODAL ────────────────────────────────────────────────────
let selectedCat = 'move';
window.openAddModal = function() {
  selectedCat = 'move';
  document.querySelectorAll('#catGrid .cat-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('#catGrid [data-cat="move"]').classList.add('selected');
  document.getElementById('fTime').value = '';
  document.getElementById('fContent').value = '';
  document.getElementById('fPlace').value = '';
  document.getElementById('fMemo').value = '';
  document.getElementById('fPhotoInput').value = '';
  document.getElementById('fPhotoGrid').innerHTML = '';
  document.getElementById('fPhotoPlaceholder').style.display = 'flex';
  document.getElementById('addOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fContent').focus(), 350);
};
window.closeAddModal = function() { document.getElementById('addOverlay').classList.remove('open'); };
window.selectCat = function(btn) {
  document.querySelectorAll('#catGrid .cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCat = btn.dataset.cat;
};
window.saveItem = async function() {
  const content = document.getElementById('fContent').value.trim();
  if (!content) { document.getElementById('fContent').focus(); return; }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = '저장 중...';
  saveBtn.disabled = true;

  try {
    // 다중 사진 Cloudinary 업로드
    const photoFiles = document.getElementById('fPhotoInput').files;
    const photoUrls = [];
    for (const file of photoFiles) {
      const url = await uploadToCloudinary(file);
      photoUrls.push(url);
    }

    const itemsRef = collection(db, 'days', String(activeDay), 'items');
    await addDoc(itemsRef, {
      cat: selectedCat,
      time: document.getElementById('fTime').value || '00:00',
      content,
      place: document.getElementById('fPlace').value.trim(),
      memo: document.getElementById('fMemo').value.trim(),
      photoUrls,
      createdAt: serverTimestamp(),
    });
    window.closeAddModal();
  } finally {
    saveBtn.textContent = '저장';
    saveBtn.disabled = false;
  }
};

// ── EDIT MODAL ───────────────────────────────────────────────────
let editCat = 'move';
let editTargetDay = null;
window.openEditModal = function(docId) {
  const items = itemsCache[activeDay] || [];
  const item = items.find(i => i.docId === docId);
  if (!item) return;
  editDocId = docId;
  editCat = item.cat;
  editTargetDay = activeDay;

  // 날짜 선택 그리드 렌더링
  const grid = document.getElementById('eFDayGrid');
  grid.innerHTML = DAYS.map((d, i) => `
    <button class="day-select-btn${i === activeDay ? ' selected' : ''}"
      onclick="selectEditDay(${i}, this)">
      <span class="day-select-emoji">${d.emoji}</span>
      <span class="day-select-date">${d.date}</span>
      <span class="day-select-weekday">${d.weekday}</span>
    </button>
  `).join('');

  document.querySelectorAll('#editCatGrid .cat-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.cat === item.cat);
  });
  document.getElementById('eFTime').value = item.time || '';
  document.getElementById('eFContent').value = item.content;
  document.getElementById('eFPlace').value = item.place || '';
  document.getElementById('eFMemo').value = item.memo || '';
  // 기존 사진 그리드 표시
  document.getElementById('eFPhotoInput').value = '';
  const eFGrid = document.getElementById('eFPhotoGrid');
  eFGrid.innerHTML = '';
  const existingUrls = item.photoUrls && item.photoUrls.length > 0
    ? item.photoUrls
    : (item.photoUrl ? [item.photoUrl] : []);
  window._editExistingPhotoUrls = [...existingUrls];
  existingUrls.forEach((url, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-thumb-wrap';
    wrap.innerHTML = `<img src="${url}" class="photo-thumb"><button class="photo-thumb-del" onclick="removeExistingPhoto(${idx})">✕</button>`;
    eFGrid.appendChild(wrap);
  });
  document.getElementById('eFPhotoPlaceholder').style.display = existingUrls.length > 0 ? 'none' : 'flex';
  document.getElementById('editOverlay').classList.add('open');
};
window.selectEditDay = function(i, btn) {
  editTargetDay = i;
  document.querySelectorAll('#eFDayGrid .day-select-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
};
window.closeEditModal = function() { document.getElementById('editOverlay').classList.remove('open'); editDocId = null; };
window.selectEditCat = function(btn) {
  document.querySelectorAll('#editCatGrid .cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  editCat = btn.dataset.cat;
};
window.updateItem = async function() {
  const content = document.getElementById('eFContent').value.trim();
  if (!content) return;

  const updateBtn = document.querySelector('#editOverlay .btn-save');
  updateBtn.textContent = '저장 중...';
  updateBtn.disabled = true;

  try {
    // 다중 사진 Cloudinary 업로드 (새로 선택한 사진)
    const newPhotoFiles = document.getElementById('eFPhotoInput').files;
    const newPhotoUrls = [];
    for (const file of newPhotoFiles) {
      const url = await uploadToCloudinary(file);
      newPhotoUrls.push(url);
    }
    // 기존 사진 + 새 사진 합치기
    const existingUrls = window._editExistingPhotoUrls || [];
    const mergedUrls = [...existingUrls, ...newPhotoUrls];

    const updatedData = {
      cat: editCat,
      time: document.getElementById('eFTime').value || '00:00',
      content,
      place: document.getElementById('eFPlace').value.trim(),
      memo: document.getElementById('eFMemo').value.trim(),
      photoUrls: mergedUrls,
      createdAt: serverTimestamp(),
    };

    if (editTargetDay !== null && editTargetDay !== activeDay) {
      await deleteDoc(doc(db, 'days', String(activeDay), 'items', editDocId));
      await addDoc(collection(db, 'days', String(editTargetDay), 'items'), updatedData);
    } else {
      delete updatedData.createdAt;
      await updateDoc(doc(db, 'days', String(activeDay), 'items', editDocId), updatedData);
    }
    window.closeEditModal();
  } finally {
    updateBtn.textContent = '수정 완료';
    updateBtn.disabled = false;
  }
};

// ── CHECKLIST ─────────────────────────────────────────────────────
function renderChecklist() {
  let totalItems = 0;
  let doneItems = 0;

  // 전체 항목 수집 (날짜 정보 포함)
  const allUnchecked = [];
  const allChecked = [];

  DAYS.forEach((d, i) => {
    const checks = (itemsCache[i] || [])
      .filter(it => it.cat === 'check')
      .map(it => ({ ...it, dayIdx: i, day: d }));

    checks.forEach(item => {
      totalItems++;
      if (item.checked) {
        doneItems++;
        allChecked.push(item);
      } else {
        allUnchecked.push(item);
      }
    });
  });

  // 미완료 먼저, 완료 맨 아래
  const sorted = [...allUnchecked, ...allChecked];

  let html = '';
  let lastDayKey = null;
  sorted.forEach(item => {
    const i = item.dayIdx;
    const d = item.day;
    const isChecked = !!item.checked;
    const hasDetail = (item.time && item.time !== '00:00') || item.memo;
    const dayKey = d.date;

    // 날짜가 바뀔 때만 날짜 헤더 출력
    if (dayKey !== lastDayKey) {
      if (lastDayKey !== null) html += `</div>`;
      html += `<div class="checklist-day-group">
        <div class="checklist-day-group-label">${d.emoji} ${d.date}(${d.weekday}) · ${d.name}</div>`;
      lastDayKey = dayKey;
    }

    html += `<div class="checklist-item${isChecked ? ' checklist-item-done' : ''}">
      <div class="checklist-checkbox${isChecked ? ' checked' : ''}" onclick="toggleCheck(${i}, '${item.docId}', ${isChecked})">✓</div>
      <div class="checklist-item-main">
        <div class="checklist-item-text${isChecked ? ' done' : ''}">${escHtml(item.content)}</div>
      </div>
      ${hasDetail ? `<button class="cl-detail-btn" onclick="toggleCheckDetail(this, ${i}, '${item.docId}')">🔍</button>` : '<span style="width:28px;display:inline-block"></span>'}
    </div>
    <div class="cl-detail-box" id="cldetail-${i}-${item.docId}" style="display:none">
      ${item.time && item.time !== '00:00' ? `<div class="cl-detail-row">🕐 ${escHtml(item.time)}</div>` : ''}
      ${item.memo ? `<div class="cl-detail-row">📝 ${escHtml(item.memo)}</div>` : ''}
    </div>`;
  });
  if (lastDayKey !== null) html += `</div>`;

  const body = document.getElementById('checklistBody');
  const progressWrap = document.getElementById('progressBarWrap');
  const progressFill = document.getElementById('progressBarFill');
  const sub = document.getElementById('checklistSub');

  if (totalItems === 0) {
    body.innerHTML = `<div class="checklist-empty">📅 날짜별 일정에서<br>✅ 체크 카테고리로 일정을 추가해 보세요</div>`;
    progressWrap.style.display = 'none';
    sub.textContent = '날짜별 일정에서 ✅ 체크 항목을 추가하면 여기에 표시됩니다';
  } else {
    body.innerHTML = html;
    progressWrap.style.display = '';
    progressFill.style.width = Math.round((doneItems / totalItems) * 100) + '%';
    sub.textContent = `전체 ${totalItems}개 중 ${doneItems}개 완료`;
  }
}

window.toggleCheck = async function(dayIdx, docId, currentChecked) {
  await updateDoc(doc(db, 'days', String(dayIdx), 'items', docId), {
    checked: !currentChecked
  });
};

window.toggleCheckDetail = function(btn, dayIdx, docId) {
  const box = document.getElementById(`cldetail-${dayIdx}-${docId}`);
  if (!box) return;
  const isOpen = box.style.display !== 'none';
  box.style.display = isOpen ? 'none' : 'block';
  btn.textContent = isOpen ? '🔍' : '🔼';
};

// ── Cloudinary 업로드 ──────────────────────────────────────────
async function uploadToCloudinary(file) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  formData.append('folder', 'osaka-planner');

  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
    method: 'POST',
    body: formData,
  });
  if (!res.ok) throw new Error('Cloudinary 업로드 실패');
  const data = await res.json();
  // 자동 압축: 최대 1200px, 품질 auto
  return data.secure_url.replace('/upload/', '/upload/w_1200,q_auto,f_auto/');
}

window.previewPhotos = function(inputId, gridId) {
  const files = document.getElementById(inputId).files;
  const grid = document.getElementById(gridId);
  const areaId = inputId === 'fPhotoInput' ? 'fPhotoArea' : 'eFPhotoArea';
  const placeholderId = inputId === 'fPhotoInput' ? 'fPhotoPlaceholder' : 'eFPhotoPlaceholder';
  const placeholder = document.getElementById(placeholderId);

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = function(e) {
      const wrap = document.createElement('div');
      wrap.className = 'photo-thumb-wrap';
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'photo-thumb';
      const del = document.createElement('button');
      del.className = 'photo-thumb-del';
      del.textContent = '✕';
      del.onclick = function() { wrap.remove(); };
      wrap.appendChild(img);
      wrap.appendChild(del);
      grid.appendChild(wrap);
    };
    reader.readAsDataURL(file);
  });
  if (placeholder && files.length > 0) placeholder.style.display = 'none';
};

window.removeExistingPhoto = function(idx) {
  if (!window._editExistingPhotoUrls) return;
  window._editExistingPhotoUrls.splice(idx, 1);
  // 그리드 재렌더링
  const grid = document.getElementById('eFPhotoGrid');
  grid.innerHTML = '';
  window._editExistingPhotoUrls.forEach((url, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-thumb-wrap';
    wrap.innerHTML = `<img src="${url}" class="photo-thumb"><button class="photo-thumb-del" onclick="removeExistingPhoto(${i})">✕</button>`;
    grid.appendChild(wrap);
  });
};

function showPhotoViewer(allUrls, startIdx) {
  let current = startIdx || 0;
  const viewer = document.createElement('div');
  viewer.className = 'photo-viewer';

  const render = () => {
    viewer.innerHTML = `
      <button class="photo-viewer-close">✕</button>
      ${allUrls.length > 1 ? '<button class="photo-viewer-prev">‹</button>' : ''}
      <img id="pvImg" src="${allUrls[current]}" alt="사진">
      ${allUrls.length > 1 ? '<button class="photo-viewer-next">›</button>' : ''}
      ${allUrls.length > 1 ? `<div class="photo-viewer-counter">${current+1} / ${allUrls.length}</div>` : ''}
    `;
    viewer.querySelector('.photo-viewer-close').onclick = () => viewer.remove();
    if (allUrls.length > 1) {
      viewer.querySelector('.photo-viewer-prev').onclick = (e) => {
        e.stopPropagation();
        current = (current - 1 + allUrls.length) % allUrls.length;
        render();
      };
      viewer.querySelector('.photo-viewer-next').onclick = (e) => {
        e.stopPropagation();
        current = (current + 1) % allUrls.length;
        render();
      };
    }
  };
  render();
  viewer.onclick = (e) => { if (e.target === viewer) viewer.remove(); };
  document.body.appendChild(viewer);
}

window.openPhotoViewer = function(url, urls, idx) {
  showPhotoViewer(urls || [url], idx || 0);
};

window.openPhotoViewerById = function(docId, idx) {
  const urls = (window.__photoCache && window.__photoCache[docId]) || [];
  if (urls.length === 0) return;
  showPhotoViewer(urls, idx);
};
